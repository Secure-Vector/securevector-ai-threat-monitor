name: Publish engine image (ghcr)

# Manual, version-pinned publish of the SecureVector ENGINE image to GHCR.
# Builds the RELEASED PyPI package (Dockerfile.engine does `pip install
# securevector-ai-monitor[app]==<version>`), so the repo source/branch doesn't
# affect the image — only the chosen version does.
#
# NO SECRETS: ghcr auth uses the built-in, ephemeral GITHUB_TOKEN.
# NO AUTO-RUN: workflow_dispatch only — it never fires on push/PR.
#
# Run it: Actions -> "Publish engine image (ghcr)" -> Run workflow -> set version.
# Requires this file + Dockerfile.engine + docker-entrypoint.sh in the repo, on
# the default branch (so the "Run workflow" button appears).

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Released securevector-ai-monitor version on PyPI"
        required: true
        default: "4.7.1"
      extra:
        description: "pip extra: app (all releases) or server (4.8.0+ lean)"
        required: false
        default: "app"

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-engine-image
  cancel-in-progress: false

jobs:
  build-push:
    # Only the canonical repo can publish (no-op on forks), AND only the
    # authorized operator may publish — any other actor's dispatch is skipped.
    if: >-
      github.repository == 'Secure-Vector/securevector-ai-threat-monitor' &&
      github.actor == 'mss04132020'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for Dockerfile.engine + docker-entrypoint.sh)
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (version + latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.engine
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ inputs.version }}
            EXTRA=${{ inputs.extra }}
          tags: |
            ghcr.io/secure-vector/securevector-ai-threat-monitor:${{ inputs.version }}
            ghcr.io/secure-vector/securevector-ai-threat-monitor:latest
          provenance: true
          sbom: true
