name: Build Installers

permissions:
  contents: read

on:
  push:
    tags:
      - 'v*'
    branches:
      - develop
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 0.3.0)'
        required: true
        default: '0.3.0'

jobs:
  # Build Windows Installer (.exe)
  build-windows:
    runs-on: windows-latest
    env:
      APP_VERSION: ${{ github.event.inputs.version || github.ref_name }}
      IS_DEVELOP: ${{ github.ref == 'refs/heads/develop' }}
      BUILD_SUFFIX: ${{ github.ref == 'refs/heads/develop' && '-dev' || '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e ".[app]"

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Validate and set version with suffix
        id: version
        shell: bash
        env:
          RAW_VERSION: ${{ env.APP_VERSION }}
          IS_DEV: ${{ env.IS_DEVELOP }}
        run: |
          # Validate version format (only allow alphanumeric, dots, hyphens, underscores)
          if [[ ! "$RAW_VERSION" =~ ^[a-zA-Z0-9._-]+$ ]]; then
            echo "Error: Invalid version format. Only alphanumeric, dots, hyphens, and underscores allowed."
            exit 1
          fi
          VERSION="${RAW_VERSION#v}"  # Remove 'v' prefix if present
          if [ "$IS_DEV" == "true" ]; then
            echo "version=${VERSION}-dev" >> $GITHUB_OUTPUT
            echo "suffix=-dev" >> $GITHUB_OUTPUT
          else
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "suffix=" >> $GITHUB_OUTPUT
          fi

      - name: Create Windows executable
        shell: bash
        run: |
          # Use --windowed only for release builds, show console for dev builds to debug errors
          WINDOWED_FLAG=""
          if [ "${{ env.IS_DEVELOP }}" != "true" ]; then
            WINDOWED_FLAG="--windowed"
          fi
          pyinstaller --noconfirm --onefile $WINDOWED_FLAG \
            --name "SecureVector${{ steps.version.outputs.suffix }}" \
            --icon "src/securevector/app/assets/favicon.ico" \
            --add-data "src/securevector/rules;securevector/rules" \
            --add-data "src/securevector/pricing;securevector/pricing" \
            --add-data "src/securevector/app/assets;securevector/app/assets" \
            --add-data "src/securevector/plugins;securevector/plugins" \
            --hidden-import webview \
            --hidden-import webview.platforms.winforms \
            --hidden-import clr \
            --hidden-import pythonnet \
            --hidden-import uvicorn \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import fastapi \
            --hidden-import starlette \
            --hidden-import starlette.routing \
            --hidden-import starlette.middleware \
            --hidden-import sqlalchemy \
            --hidden-import aiosqlite \
            --hidden-import watchdog \
            --hidden-import watchdog.observers \
            --hidden-import watchdog.events \
            --hidden-import httpx \
            --hidden-import keyring \
            --hidden-import keyring.backends \
            --hidden-import platformdirs \
            src/securevector/app/main.py

      - name: Create Inno Setup installer
        env:
          APP_SUFFIX: ${{ steps.version.outputs.suffix }}
        run: |
          iscc /DAppSuffix="${{ steps.version.outputs.suffix }}" installers/windows/securevector-setup.iss

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: SecureVector${{ steps.version.outputs.suffix }}-Windows-Installer
          path: installers/windows/Output/*.exe

  # Build macOS Installer (.pkg and .dmg)
  build-macos:
    runs-on: macos-latest
    env:
      APP_VERSION: ${{ github.event.inputs.version || github.ref_name }}
      IS_DEVELOP: ${{ github.ref == 'refs/heads/develop' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow
          pip install -e ".[app]"
          brew install create-dmg

      - name: Validate and set version with suffix
        id: version
        env:
          RAW_VERSION: ${{ env.APP_VERSION }}
          IS_DEV: ${{ env.IS_DEVELOP }}
        run: |
          # Validate version format (only allow alphanumeric, dots, hyphens, underscores)
          if [[ ! "$RAW_VERSION" =~ ^[a-zA-Z0-9._-]+$ ]]; then
            echo "Error: Invalid version format. Only alphanumeric, dots, hyphens, and underscores allowed."
            exit 1
          fi
          VERSION="${RAW_VERSION#v}"  # Remove 'v' prefix if present
          # Dev builds get their own bundle identifier so macOS LaunchServices
          # treats SecureVector-dev.app and SecureVector.app as independent
          # apps (separate "Open With" registration, notification permissions,
          # defaults domain) instead of two copies of the same app.
          if [ "$IS_DEV" == "true" ]; then
            echo "version=${VERSION}-dev" >> $GITHUB_OUTPUT
            echo "suffix=-dev" >> $GITHUB_OUTPUT
            echo "app_name=SecureVector-dev" >> $GITHUB_OUTPUT
            echo "bundle_id=io.securevector.threatmonitor.dev" >> $GITHUB_OUTPUT
          else
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "suffix=" >> $GITHUB_OUTPUT
            echo "app_name=SecureVector" >> $GITHUB_OUTPUT
            echo "bundle_id=io.securevector.threatmonitor" >> $GITHUB_OUTPUT
          fi

      # Imports the Developer ID cert into an ephemeral keychain when the
      # secrets are configured; otherwise the build proceeds unsigned (adhoc)
      # so forks and pre-secret branches still produce artifacts.
      - name: Import signing certificate (ephemeral keychain)
        id: cert
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERT_P12" ]; then
            echo "has_cert=false" >> "$GITHUB_OUTPUT"
            echo "No MACOS_CERT_P12 secret - building unsigned (adhoc)."
            exit 0
          fi
          KEYCHAIN_PW=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PW" build.keychain
          security set-keychain-settings -lut 3600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PW" build.keychain
          echo "$MACOS_CERT_P12" | base64 -d > /tmp/cert.p12
          security import /tmp/cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          rm -f /tmp/cert.p12
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" build.keychain >/dev/null
          security list-keychains -d user -s build.keychain login.keychain
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | sed -n 's/.*"\(Developer ID Application[^"]*\)".*/\1/p' | head -1)
          if [ -z "$IDENTITY" ]; then
            echo "Cert imported but no valid Developer ID Application identity found" >&2
            exit 1
          fi
          echo "has_cert=true" >> "$GITHUB_OUTPUT"
          echo "identity=$IDENTITY" >> "$GITHUB_OUTPUT"

      # PyInstaller's --windowed mode emits a correct .app bundle (proper
      # Frameworks/Resources symlink farm, CFBundleIconFile wired to the
      # generated .icns). Do NOT hand-assemble a bundle from the onedir tree:
      # cp -r dereferences the symlinks, which both bloats the bundle and
      # makes it unsignable (codesign treats loose files under Contents/MacOS
      # as unsigned code). --codesign-identity signs every collected binary
      # inside-out during the build.
      - name: Create macOS app bundle
        run: |
          SIGN_FLAGS=()
          if [ "${{ steps.cert.outputs.has_cert }}" == "true" ]; then
            SIGN_FLAGS=(--codesign-identity "${{ steps.cert.outputs.identity }}" \
                        --osx-entitlements-file installers/macos/entitlements.plist)
          fi
          pyinstaller --noconfirm --onedir --windowed \
            "${SIGN_FLAGS[@]}" \
            --name "${{ steps.version.outputs.app_name }}" \
            --osx-bundle-identifier "${{ steps.version.outputs.bundle_id }}" \
            --icon "src/securevector/app/assets/favicon.png" \
            --add-data "src/securevector/rules:securevector/rules" \
            --add-data "src/securevector/pricing:securevector/pricing" \
            --add-data "src/securevector/app/assets:securevector/app/assets" \
            --add-data "src/securevector/plugins:securevector/plugins" \
            --hidden-import webview \
            --hidden-import uvicorn \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import fastapi \
            --hidden-import starlette \
            --hidden-import starlette.routing \
            --hidden-import starlette.middleware \
            --hidden-import sqlalchemy \
            --hidden-import aiosqlite \
            --hidden-import watchdog \
            --hidden-import watchdog.observers \
            --hidden-import watchdog.events \
            --hidden-import httpx \
            --hidden-import keyring \
            --hidden-import keyring.backends \
            --hidden-import platformdirs \
            src/securevector/app/main.py

      # Set the version on PyInstaller's own Info.plist (which keeps
      # CFBundleIconFile and the rest intact), then re-seal the outer bundle —
      # the plist edit invalidates the bundle signature PyInstaller created,
      # but the nested binaries it signed stay valid.
      - name: Finalize bundle metadata and seal signature
        env:
          VERSION: ${{ steps.version.outputs.version }}
          APP_NAME: ${{ steps.version.outputs.app_name }}
        run: |
          PLIST="dist/${APP_NAME}.app/Contents/Info.plist"
          for kv in "CFBundleVersion ${VERSION}" "CFBundleShortVersionString ${VERSION}" "LSMinimumSystemVersion 11.0"; do
            KEY="${kv%% *}"; VAL="${kv#* }"
            /usr/libexec/PlistBuddy -c "Set :${KEY} ${VAL}" "$PLIST" 2>/dev/null || \
              /usr/libexec/PlistBuddy -c "Add :${KEY} string ${VAL}" "$PLIST"
          done
          if [ "${{ steps.cert.outputs.has_cert }}" == "true" ]; then
            codesign --force --options runtime --timestamp \
              --entitlements installers/macos/entitlements.plist \
              --sign "${{ steps.cert.outputs.identity }}" "dist/${APP_NAME}.app"
            codesign --verify --strict --deep -v "dist/${APP_NAME}.app"
          fi

      - name: Create DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
          APP_NAME: ${{ steps.version.outputs.app_name }}
        run: |
          # create-dmg builds via hdiutil (symlinks preserved). It can exit
          # non-zero on Finder-styling flakiness while still producing a valid
          # image, so verify the artifact exists instead of trusting the code.
          create-dmg --volname "${APP_NAME} Installer" --window-pos 200 120 --window-size 600 400 --icon-size 100 --icon "${APP_NAME}.app" 175 190 --app-drop-link 425 190 "${APP_NAME}-${VERSION}-macOS.dmg" "dist/${APP_NAME}.app" || true
          test -f "${APP_NAME}-${VERSION}-macOS.dmg" || { echo "DMG was not produced" >&2; exit 1; }
          if [ "${{ steps.cert.outputs.has_cert }}" == "true" ]; then
            codesign --force --timestamp --sign "${{ steps.cert.outputs.identity }}" "${APP_NAME}-${VERSION}-macOS.dmg"
          fi

      # Notarization needs an App Store Connect API key. Skipped (with a log
      # line) when the ASC secrets aren't configured, so unsigned/dev builds
      # still pass. Stapling makes Gatekeeper validation work offline.
      - name: Notarize and staple DMG
        if: steps.cert.outputs.has_cert == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          APP_NAME: ${{ steps.version.outputs.app_name }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          if [ -z "$ASC_API_KEY_P8" ]; then
            echo "No ASC_API_KEY_P8 secret - skipping notarization (dmg is signed but not notarized)."
            exit 0
          fi
          DMG="${APP_NAME}-${VERSION}-macOS.dmg"
          echo "$ASC_API_KEY_P8" | base64 -d > /tmp/asc.p8
          xcrun notarytool submit "$DMG" \
            --key /tmp/asc.p8 --key-id "$ASC_KEY_ID" --issuer "$ASC_ISSUER_ID" \
            --wait --timeout 30m
          rm -f /tmp/asc.p8
          xcrun stapler staple "$DMG"
          spctl -a -t open --context context:primary-signature -vv "$DMG"

      # Defense-in-depth: the inline `rm -f` after cert import / notarize only
      # runs on the happy path — if `security import` or `notarytool` fails,
      # `set -e` aborts the step before cleanup. This always() step guarantees
      # the decoded signing material and keychain are gone regardless of outcome.
      # (Runner is ephemeral, so this is belt-and-suspenders, not load-bearing.)
      - name: Delete ephemeral keychain and signing material
        if: always()
        run: |
          security delete-keychain build.keychain 2>/dev/null || true
          rm -f /tmp/cert.p12 /tmp/asc.p8

      - name: Upload macOS installers
        uses: actions/upload-artifact@v4
        with:
          name: SecureVector${{ steps.version.outputs.suffix }}-macOS-Installer
          path: |
            *.dmg

  # Build Linux Installers (.deb, .rpm, AppImage)
  # Use ubuntu-22.04 for GLIBC 2.35 compatibility (supports Ubuntu 22.04+, Debian 12+)
  build-linux:
    runs-on: ubuntu-22.04
    env:
      APP_VERSION: ${{ github.event.inputs.version || github.ref_name }}
      IS_DEVELOP: ${{ github.ref == 'refs/heads/develop' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm
          sudo gem install fpm
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -e ".[app]"

      - name: Validate and set version with suffix
        id: version
        env:
          RAW_VERSION: ${{ env.APP_VERSION }}
          IS_DEV: ${{ env.IS_DEVELOP }}
        run: |
          # Validate version format (only allow alphanumeric, dots, hyphens, underscores)
          if [[ ! "$RAW_VERSION" =~ ^[a-zA-Z0-9._-]+$ ]]; then
            echo "Error: Invalid version format. Only alphanumeric, dots, hyphens, and underscores allowed."
            exit 1
          fi
          VERSION="${RAW_VERSION#v}"  # Remove 'v' prefix if present
          if [ "$IS_DEV" == "true" ]; then
            echo "version=${VERSION}-dev" >> $GITHUB_OUTPUT
            echo "suffix=-dev" >> $GITHUB_OUTPUT
            echo "pkg_name=securevector-dev" >> $GITHUB_OUTPUT
          else
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
            echo "suffix=" >> $GITHUB_OUTPUT
            echo "pkg_name=securevector" >> $GITHUB_OUTPUT
          fi

      - name: Create Linux executable
        run: |
          pyinstaller --noconfirm --onefile \
            --name "${{ steps.version.outputs.pkg_name }}" \
            --add-data "src/securevector/rules:securevector/rules" \
            --add-data "src/securevector/pricing:securevector/pricing" \
            --add-data "src/securevector/app/assets:securevector/app/assets" \
            --add-data "src/securevector/plugins:securevector/plugins" \
            --hidden-import webview \
            --hidden-import uvicorn \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import fastapi \
            --hidden-import starlette \
            --hidden-import starlette.routing \
            --hidden-import starlette.middleware \
            --hidden-import sqlalchemy \
            --hidden-import aiosqlite \
            --hidden-import watchdog \
            --hidden-import watchdog.observers \
            --hidden-import watchdog.events \
            --hidden-import httpx \
            --hidden-import keyring \
            --hidden-import keyring.backends \
            --hidden-import platformdirs \
            src/securevector/app/main.py

      - name: Prepare package structure
        env:
          PKG_NAME: ${{ steps.version.outputs.pkg_name }}
        run: |
          mkdir -p package/usr/bin
          mkdir -p package/usr/share/applications
          mkdir -p package/usr/share/icons/hicolor/256x256/apps
          mkdir -p package/usr/share/pixmaps
          mkdir -p package/lib/systemd/user
          cp "dist/${PKG_NAME}" package/usr/bin/
          chmod +x "package/usr/bin/${PKG_NAME}"
          # Copy app icon
          cp src/securevector/app/assets/favicon.png package/usr/share/icons/hicolor/256x256/apps/securevector.png
          cp src/securevector/app/assets/favicon.png package/usr/share/pixmaps/securevector.png
          cat > "package/usr/share/applications/${PKG_NAME}.desktop" << DESKTOP_EOF
          [Desktop Entry]
          Name=SecureVector${{ steps.version.outputs.suffix }}
          Comment=AI Threat Monitor
          Exec=/usr/bin/${PKG_NAME}
          Icon=securevector
          Terminal=false
          Type=Application
          Categories=Security;Development;
          DESKTOP_EOF
          cat > "package/usr/share/applications/${PKG_NAME}-openclaw-proxy.desktop" << DESKTOP_EOF2
          [Desktop Entry]
          Name=SecureVector${{ steps.version.outputs.suffix }} (OpenClaw Proxy)
          Comment=AI Threat Monitor with OpenClaw Proxy
          Exec=/usr/bin/${PKG_NAME} --web --proxy openclaw
          Icon=securevector
          Terminal=false
          Type=Application
          Categories=Security;Development;
          DESKTOP_EOF2
          cat > "package/lib/systemd/user/${PKG_NAME}.service" << SERVICE_EOF
          [Unit]
          Description=SecureVector AI Threat Monitor
          After=network.target
          [Service]
          Type=simple
          ExecStart=/usr/bin/${PKG_NAME} --port 8741
          Restart=on-failure
          RestartSec=10
          [Install]
          WantedBy=default.target
          SERVICE_EOF

      - name: Build .deb package
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PKG_NAME: ${{ steps.version.outputs.pkg_name }}
        run: |
          fpm -s dir -t deb -n "${PKG_NAME}" -v "${VERSION}" --description "SecureVector AI Threat Monitor" --url "https://securevector.io" --maintainer "SecureVector" --license "Apache-2.0" -C package .

      - name: Build .rpm package
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PKG_NAME: ${{ steps.version.outputs.pkg_name }}
        run: |
          fpm -s dir -t rpm -n "${PKG_NAME}" -v "${VERSION}" --description "SecureVector AI Threat Monitor" --url "https://securevector.io" --maintainer "SecureVector" --license "Apache-2.0" -C package .

      - name: Build AppImage
        env:
          VERSION: ${{ steps.version.outputs.version }}
          PKG_NAME: ${{ steps.version.outputs.pkg_name }}
          SUFFIX: ${{ steps.version.outputs.suffix }}
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          mkdir -p SecureVector.AppDir/usr/bin
          cp "dist/${PKG_NAME}" SecureVector.AppDir/usr/bin/
          cp "package/usr/share/applications/${PKG_NAME}.desktop" SecureVector.AppDir/
          # Copy icon for AppImage (required by appimagetool)
          cp src/securevector/app/assets/favicon.png SecureVector.AppDir/securevector.png
          cat > SecureVector.AppDir/AppRun << APPRUN_EOF
          #!/bin/bash
          SELF=\$(readlink -f "\$0")
          HERE=\${SELF%/*}
          exec "\${HERE}/usr/bin/${PKG_NAME}" "\$@"
          APPRUN_EOF
          chmod +x SecureVector.AppDir/AppRun
          # Use --appimage-extract-and-run to avoid FUSE requirement on GitHub Actions
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run SecureVector.AppDir "SecureVector${SUFFIX}-${VERSION}-x86_64.AppImage"

      - name: Upload Linux installers
        uses: actions/upload-artifact@v4
        with:
          name: SecureVector${{ steps.version.outputs.suffix }}-Linux-Installers
          path: |
            *.deb
            *.rpm
            *.AppImage

  # Create GitHub Release with all installers (only for tags, not develop)
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: installers

      - name: Generate checksums
        run: |
          cd installers
          find . -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) -exec sha256sum {} \; > ../SHA256SUMS.txt
          cd ..
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            installers/**/*.exe
            installers/**/*.dmg
            installers/**/*.deb
            installers/**/*.rpm
            installers/**/*.AppImage
            SHA256SUMS.txt
          draft: false
          prerelease: false
          generate_release_notes: true

  # Upload develop artifacts (no release, just artifacts)
  develop-artifacts:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: installers

      - name: Generate checksums
        run: |
          cd installers
          find . -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \) -exec sha256sum {} \; > ../SHA256SUMS-dev.txt
          cd ..
          echo "=== Development Build Checksums ==="
          cat SHA256SUMS-dev.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: SecureVector-dev-Checksums
          path: SHA256SUMS-dev.txt
