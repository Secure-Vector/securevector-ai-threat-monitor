      description: Detection pattern for (?:list|show)\s+all\s+(?:custo...
    pattern_2:
      regex: (?:give|show)\s+me\s+all\s+(?:customer|user)\s+information
      description: Detection pattern for (?:give|show)\s+me\s+all\s+(?:...
    pattern_3:
      regex: extract\s+all\s+(?:records|data)\s+from
      description: Detection pattern for extract\s+all\s+(?:records|dat...
- category: sensitive_data_exposure
