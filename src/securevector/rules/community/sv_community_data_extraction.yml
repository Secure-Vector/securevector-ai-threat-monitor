  - (?:give|show)\s+me\s+all\s+(?:customer|user)\s+information
  - extract\s+all\s+(?:records|data|credentials?|passwords?)\s+from
  - (?:output|dump|export)\s+.*(?:as\s+)?(?:json|csv|xml)
